services:
  api:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
    environment:
      INTERNAL_API_BASE_URL: http://api:8000
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
